name: Import Jobs to Supabase

on:
  schedule:
    - cron: '0 6,18 * * *'   # 06:00 e 18:00 UTC, todos os dias
  workflow_dispatch:          # permite rodar manualmente pela aba Actions

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run job import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          MUSE_API_KEY: ${{ secrets.MUSE_API_KEY }}
          FINDWORK_API_KEY: ${{ secrets.FINDWORK_API_KEY }}
        run: npm run fetch-jobs
