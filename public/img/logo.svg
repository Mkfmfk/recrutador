<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Q circle with circuit pattern -->
  <g filter="url(#glowStrong)">
    <!-- Outer circuit ring -->
    <circle cx="40" cy="40" r="28" stroke="url(#neonGrad)" stroke-width="2.5" fill="none" opacity="0.6"/>
    <!-- Circuit dots on outer ring -->
    <circle cx="40" cy="12" r="2" fill="#00d4ff"/>
    <circle cx="60" cy="16" r="1.5" fill="#4facfe"/>
    <circle cx="66" cy="30" r="1.5" fill="#00f2fe"/>
    <circle cx="66" cy="50" r="1.5" fill="#4facfe"/>
    <circle cx="14" cy="35" r="1.5" fill="#00d4ff"/>
    <circle cx="18" cy="55" r="1.5" fill="#4facfe"/>
    <!-- Circuit lines -->
    <path d="M40 12 L45 12 L48 15" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <path d="M14 35 L18 35 L20 38" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <path d="M60 16 L62 18" stroke="#4facfe" stroke-width="1" opacity="0.7"/>
    <path d="M18 55 L22 55 L24 52" stroke="#4facfe" stroke-width="1" opacity="0.7"/>
    
    <!-- Inner ring -->
    <circle cx="40" cy="40" r="18" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
    
    <!-- Q letter main body -->
    <circle cx="40" cy="40" r="12" stroke="url(#neonGrad)" stroke-width="3" fill="none"/>
    
    <!-- Q tail (diagonal) -->
    <line x1="48" y1="48" x2="58" y2="58" stroke="url(#neonGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="44" x2="56" y2="48" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- 1 with tech styling -->
  <g filter="url(#glowStrong)">
    <path d="M62 22 L68 22 L68 58 L62 58 Z" fill="url(#neonGrad)"/>
    <path d="M58 22 L62 18 L62 22 Z" fill="url(#neonGrad)" opacity="0.8"/>
    <!-- Ruler marks on the 1 -->
    <line x1="68" y1="28" x2="71" y2="28" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <line x1="68" y1="34" x2="70" y2="34" stroke="#4facfe" stroke-width="1" opacity="0.5"/>
    <line x1="68" y1="40" x2="71" y2="40" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <line x1="68" y1="46" x2="70" y2="46" stroke="#4facfe" stroke-width="1" opacity="0.5"/>
    <line x1="68" y1="52" x2="71" y2="52" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <!-- Base of 1 -->
    <rect x="58" y="56" width="16" height="3" rx="1" fill="url(#neonGrad)" opacity="0.8"/>
  </g>
  
  <!-- "Jobs" text -->
  <text x="82" y="52" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="-1">Jobs</text>
  
  <!-- "Digital" subtitle -->
  <text x="82" y="68" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="300" fill="#7ec8e3" letter-spacing="3" opacity="0.9">DIGITAL</text>
</svg>
